version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: oficina_postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: src/Oficina.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - DOTNET_RUNNING_IN_CONTAINER=true
    volumes:
      - ./.env:/app/.env:ro
    ports:
      - "5001:5000"
    depends_on:
      - postgres

volumes:
  postgres_data:
